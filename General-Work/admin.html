<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Vocabulary Extractor</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 860px; margin: 2em auto; padding: 0 1em; background: #f7f7f7; color: #222; }
    h1 { font-size: 1.3em; margin-bottom: 0.3em; }
    p.note { font-size: 0.9em; color: #555; margin-top: 0; }
    label { font-weight: bold; }
    input[type="file"] { display: block; margin: 0.6em 0 1em; }
    button { padding: 0.5em 1.2em; font-size: 1em; cursor: pointer; margin-right: 0.5em; }
    button:disabled { opacity: 0.4; cursor: default; }
    #status { margin: 0.8em 0; font-size: 0.9em; color: #444; min-height: 1.2em; }
    #status.error { color: #c00; }
    textarea { width: 100%; height: 320px; font-family: monospace; font-size: 0.82em;
               white-space: pre; overflow-x: auto; box-sizing: border-box;
               border: 1px solid #bbb; padding: 0.5em; background: #fff; }
    #summary { font-size: 0.85em; color: #444; margin-top: 0.4em; }
    .controls { margin-bottom: 1em; }
  </style>
</head>
<body>
  <h1>QA Vocabulary Extractor</h1>
  <p class="note">
    Select one or more QA_ HTML files. The extractor reads each file's
    <code>&lt;meta name="qa-vocab"&gt;</code>, <code>qa-version</code>, and
    <code>phrases</code> array, then outputs a tab-delimited report you can
    paste into Excel. Output file name includes a timestamp.
  </p>

  <div class="controls">
    <label for="fileInput">Select QA_ HTML files:</label>
    <input type="file" id="fileInput" accept=".html" multiple>
    <button id="runBtn" disabled>Extract</button>
    <button id="downloadBtn" disabled>Download TSV</button>
  </div>

  <div id="status"></div>
  <textarea id="output" readonly placeholder="TSV output will appear here…"></textarea>
  <div id="summary"></div>

  <script>
    const fileInput   = document.getElementById('fileInput');
    const runBtn      = document.getElementById('runBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const statusEl    = document.getElementById('status');
    const outputEl    = document.getElementById('output');
    const summaryEl   = document.getElementById('summary');

    let tsvResult = '';
    let outFilename = '';

    fileInput.addEventListener('change', () => {
      const hasFiles = fileInput.files.length > 0;
      runBtn.disabled = !hasFiles;
      downloadBtn.disabled = true;
      outputEl.value = '';
      summaryEl.textContent = '';
      statusEl.textContent = hasFiles
        ? `${fileInput.files.length} file(s) selected.`
        : '';
      statusEl.className = '';
    });

    runBtn.addEventListener('click', async () => {
      statusEl.textContent = 'Processing…';
      statusEl.className = '';
      outputEl.value = '';
      summaryEl.textContent = '';
      downloadBtn.disabled = true;

      const files = Array.from(fileInput.files);
      const rows  = [];
      const header = ['filename','path','qa-vocab','qa-version',
                      'word','wordES','set1_en','set1_es','set2_en','set2_es'];
      rows.push(header.join('\t'));

      let fileCount = 0;
      let rowCount  = 0;
      const errors  = [];

      for (const file of files) {
        try {
          const text   = await file.text();
          const parser = new DOMParser();
          const doc    = parser.parseFromString(text, 'text/html');

          const qaVocab   = getMeta(doc, 'qa-vocab');
          const qaVersion = getMeta(doc, 'qa-version') || '1';
          // file.webkitRelativePath is populated when using a directory picker;
          // with a plain file input it's empty, so fall back to file.name.
          const filePath  = file.webkitRelativePath || file.name;
          const fileName  = file.name;

          const phrases = extractPhrases(text);

          if (phrases === null) {
            errors.push(`${fileName}: could not find phrases array.`);
            // still emit one row so the file appears in the report
            rows.push([fileName, filePath, qaVocab, qaVersion,
                       '', '', '', '', '', ''].join('\t'));
            fileCount++;
            continue;
          }

          for (const p of phrases) {
            rows.push([
              fileName,
              filePath,
              qaVocab,
              qaVersion,
              p.word    ?? '',
              p.wordEs  ?? '',
              p.set1en  ?? '',
              p.set1es  ?? '',
              p.set2en  ?? '',
              p.set2es  ?? ''
            ].join('\t'));
            rowCount++;
          }
          fileCount++;
        } catch (err) {
          errors.push(`${file.name}: ${err.message}`);
        }
      }

      tsvResult  = rows.join('\r\n');
      outFilename = `qa-vocab-export_${timestamp()}.tsv`;

      outputEl.value = tsvResult;
      downloadBtn.disabled = false;

      let msg = `Done. ${fileCount} file(s) processed, ${rowCount} phrase row(s) extracted.`;
      if (errors.length) {
        msg += '\n\nWarnings:\n' + errors.join('\n');
        statusEl.className = 'error';
      } else {
        statusEl.className = '';
      }
      statusEl.textContent = msg;
      summaryEl.textContent = `Output file will be named: ${outFilename}`;
    });

    downloadBtn.addEventListener('click', () => {
      const blob = new Blob([tsvResult], { type: 'text/tab-separated-values' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = outFilename;
      a.click();
      URL.revokeObjectURL(url);
    });

    // ── Helpers ──────────────────────────────────────────────────────────────

    function getMeta(doc, name) {
      const el = doc.querySelector(`meta[name="${name}"]`);
      return el ? (el.getAttribute('content') || '') : '';
    }

    function extractPhrases(text) {
      // Find the phrases array literal in the JS source.
      // Strategy: locate "const phrases = [" then extract the balanced bracket block.
      const startMarker = 'const phrases = [';
      const startIdx = text.indexOf(startMarker);
      if (startIdx === -1) return null;

      let i     = startIdx + startMarker.length - 1; // points at '['
      let depth = 0;
      let end   = -1;

      for (; i < text.length; i++) {
        if (text[i] === '[') depth++;
        else if (text[i] === ']') {
          depth--;
          if (depth === 0) { end = i; break; }
        }
      }
      if (end === -1) return null;

      const arraySource = text.slice(startIdx + startMarker.length - 1, end + 1);

      // Use Function() to evaluate the array literal safely.
      // We only evaluate the isolated array literal, not the whole file.
      let phrases;
      try {
        // eslint-disable-next-line no-new-func
        phrases = (new Function(`return ${arraySource}`))();
      } catch (e) {
        return null;
      }

      return phrases.map(p => ({
        word:   p.word   ?? '',
        wordEs: p.wordEs ?? '',
        set1en: p.set1?.en ?? '',
        set1es: p.set1?.es ?? '',
        set2en: p.set2?.en ?? '',
        set2es: p.set2?.es ?? ''
      }));
    }

    function timestamp() {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`
           + `_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    }
  </script>
</body>
</html>
